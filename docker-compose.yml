version: "3.9"

services:
  backend:
    build: .
    container_name: financial-ai-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  frontend:
    build: .
    container_name: financial-ai-frontend
    command: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env
    environment:
      - STREAMLIT_BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - backend
